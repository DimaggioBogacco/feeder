<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Baby Feed Tracker</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
      :root {
        --primary-blue: #1a73e8;
        --text-main: #1a1a1a;
        --text-secondary: #70757a;
        --border-color: #e8eaed;
        --status-green: #34a853;
        --status-yellow: #fbbc05;
        --status-red: #ea4335;
      }
      body {
        font-family: -apple-system, sans-serif;
        background: #ffffff;
        margin: 0;
        padding: 0;
        color: var(--text-main);
        -webkit-tap-highlight-color: transparent;
      }

      #status-bar {
        width: 100%;
        padding: 14px 0;
        text-align: center;
        color: white;
        font-weight: 400;
        transition: background-color 0.5s ease;
        position: sticky;
        top: 0;
        z-index: 100;
        font-size: 16px;
      }
      .time-bold {
        font-weight: 600;
      }

      .main-content {
        padding: 20px;
        max-width: 500px;
        margin: 0 auto;
      }
      h1 {
        font-size: 32px;
        font-weight: 800;
        margin: 20px 0;
      }

      /* Input Styling */
      input,
      textarea {
        width: 100%;
        border: 1px solid #ced4da;
        border-radius: 12px;
        font-size: 18px;
        box-sizing: border-box;
        margin-bottom: 10px;
        outline: none;
        font-family: inherit;
      }
      input:focus,
      textarea:focus {
        border-color: var(--primary-blue);
      }

      /* Volume input specific height */
      input#volume {
        padding: 16px;
        height: 56px;
      }

      /* Note input set to twice the height of volume input */
      textarea#note {
        padding: 16px;
        height: 112px; /* 56px * 2 */
        resize: none;
      }

      .btn-submit {
        width: 100%;
        padding: 16px;
        background: var(--primary-blue);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 18px;
        font-weight: 700;
        cursor: pointer;
      }

      .stats-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 0;
        border-bottom: 1px solid var(--border-color);
        font-weight: 500;
        margin-top: 10px;
        color: #555;
      }
      .stats-label {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .stats-icon {
        font-size: 32px;
      }

      .day-section {
        margin-top: 24px;
      }
      .day-title {
        color: var(--text-secondary);
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 12px;
      }

      .log-card {
        border: 1px solid var(--border-color);
        border-radius: 12px;
        margin-bottom: 8px;
        padding: 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: 600;
        user-select: none;
        cursor: pointer;
        transition: all 0.15s ease;
      }
      .log-card:hover {
        background-color: #f8f9fa;
        border-color: #d1d5db;
      }
      .log-card:active {
        background-color: #f1f3f4;
        transform: scale(0.98);
      }

      .log-note {
        font-size: 13px;
        color: var(--text-secondary);
        font-weight: 400;
        margin-top: 4px;
        display: block;
      }
      .day-summary {
        display: flex;
        justify-content: space-between;
        padding: 12px 4px;
        color: var(--text-secondary);
        font-size: 14px;
        border-bottom: 1px solid var(--border-color);
        margin-bottom: 10px;
      }

      #context-menu {
        position: absolute;
        display: none;
        background: white;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        width: 160px;
        z-index: 1000;
        overflow: hidden;
        border: 1px solid var(--border-color);
      }
      .menu-item {
        padding: 14px 16px;
        font-size: 15px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 500;
      }
      .menu-item i {
        font-size: 20px;
      }
      .menu-item:hover {
        background: #f8f9fa;
      }
      .menu-item.delete {
        color: #d93025;
        border-top: 1px solid #eee;
      }
    </style>
  </head>
  <body>
    <div id="status-bar" style="background-color: var(--text-secondary)">
      Last fed: <span id="timer-text">--</span> ago
    </div>

    <div class="main-content">
      <h1>Log feeding</h1>
      <input
        type="number"
        id="volume"
        placeholder="Volume in ml"
        inputmode="decimal"
      />
      <textarea id="note" placeholder="Note (optional)"></textarea>
      <button class="btn-submit" id="logBtn">Submit</button>

      <div class="stats-bar">
        <div class="stats-label">
          <span id="volume-icon-container"></span>
          <span>Last 24h</span>
        </div>
        <span id="rolling-24h">0 ml</span>
      </div>

      <div id="history-container"></div>
    </div>

    <div id="context-menu">
      <div class="menu-item" id="menu-edit">
        <i class="ph ph-pencil-simple"></i> Edit
      </div>
      <div class="menu-item delete" id="menu-delete">
        <i class="ph ph-trash"></i> Delete
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
      import {
        getDatabase,
        ref,
        push,
        onValue,
        remove,
        update,
      } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCecVwwq7pHQs0enaGUA6wUZG-Wz4KQ94c",
        authDomain: "feeder-99e8b.firebaseapp.com",
        projectId: "feeder-99e8b",
        storageBucket: "feeder-99e8b.firebasestorage.app",
        messagingSenderId: "662741977621",
        appId: "1:662741977621:web:e99e0beccb65b050c41c1c",
        measurementId: "G-F9Q342KXGC",
        databaseURL:
          "https://feeder-99e8b-default-rtdb.europe-west1.firebasedatabase.app/",
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
      const logsRef = ref(db, "feedings");

      let currentActiveLogId = null;
      let lastFeedingTimestamp = null;
      const menu = document.getElementById("context-menu");
      const statusBar = document.getElementById("status-bar");

      function updateTimer() {
        if (!lastFeedingTimestamp) return;
        const diff = Date.now() - lastFeedingTimestamp;
        const hours = Math.floor(diff / 3600000);
        const minutes = Math.floor((diff % 3600000) / 60000);
        document.getElementById("timer-text").innerHTML =
          `<span class="time-bold">${hours}h ${minutes}m</span>`;

        if (diff < 3600000) {
          statusBar.style.backgroundColor = "var(--status-green)";
          statusBar.style.color = "white";
        } else if (diff < 9000000) {
          statusBar.style.backgroundColor = "var(--status-yellow)";
          statusBar.style.color = "#1a1a1a";
        } else {
          statusBar.style.backgroundColor = "var(--status-red)";
          statusBar.style.color = "white";
        }
      }
      setInterval(updateTimer, 30000);

      document.getElementById("logBtn").onclick = () => {
        const vol = document.getElementById("volume").value;
        const note = document.getElementById("note").value;
        if (!vol) return;
        push(logsRef, {
          amount: parseFloat(vol),
          note: note,
          timestamp: Date.now(),
        });
        document.getElementById("volume").value = "";
        document.getElementById("note").value = "";
      };

      onValue(logsRef, (snapshot) => {
        const data = snapshot.val();
        const container = document.getElementById("history-container");
        const rollingDisplay = document.getElementById("rolling-24h");
        const iconContainer = document.getElementById("volume-icon-container");
        container.innerHTML = "";
        if (!data) {
          rollingDisplay.innerText = "0 ml";
          return;
        }

        const entries = Object.entries(data).sort(
          (a, b) => b[1].timestamp - a[1].timestamp,
        );
        lastFeedingTimestamp = entries[0][1].timestamp;
        updateTimer();

        const oneDayAgo = Date.now() - 86400000;
        const total24h = entries
          .filter((e) => e[1].timestamp > oneDayAgo)
          .reduce((s, e) => s + e[1].amount, 0);
        rollingDisplay.innerText = `${total24h} ml`;

        if (total24h > 580) {
          iconContainer.innerHTML = `<i class="ph-fill ph-check-circle stats-icon" style="color: var(--status-green);"></i>`;
        } else if (total24h > 480) {
          iconContainer.innerHTML = `<i class="ph-fill ph-warning-circle stats-icon" style="color: var(--status-yellow);"></i>`;
        } else {
          iconContainer.innerHTML = `<i class="ph-fill ph-warning-octagon stats-icon" style="color: var(--status-red);"></i>`;
        }

        const groups = entries.reduce((acc, [id, val]) => {
          const d = new Date(val.timestamp).toLocaleDateString("en-GB", {
            day: "2-digit",
            month: "short",
            year: "numeric",
          });
          if (!acc[d]) acc[d] = [];
          acc[d].push({ id, ...val });
          return acc;
        }, {});

        for (const [date, dayLogs] of Object.entries(groups)) {
          let dayTotal = 0;
          let dayHtml = `<div class="day-section"><div class="day-title">${date}</div>`;
          dayLogs.forEach((log) => {
            const time = new Date(log.timestamp).toLocaleTimeString([], {
              hour: "2-digit",
              minute: "2-digit",
              hour12: false,
            });
            dayTotal += log.amount;
            dayHtml += `<div class="log-card" data-id="${log.id}"><div>${time}${log.note ? `<span class="log-note">${log.note}</span>` : ""}</div><span>${log.amount} ml</span></div>`;
          });
          dayHtml += `<div class="day-summary"><span>${dayLogs.length} times</span><span>${dayTotal} ml</span></div></div>`;
          container.innerHTML += dayHtml;
        }
        setupInteractions();
      });

      function setupInteractions() {
        document.querySelectorAll(".log-card").forEach((card) => {
          let timer;
          const id = card.getAttribute("data-id");
          const handleMenu = (e) => {
            e.preventDefault();
            currentActiveLogId = id;
            const x = e.pageX || (e.touches ? e.touches[0].pageX : 0);
            const y = e.pageY || (e.touches ? e.touches[0].pageY : 0);
            menu.style.display = "block";
            menu.style.left = `${Math.min(x, window.innerWidth - 170)}px`;
            menu.style.top = `${y}px`;
          };
          card.oncontextmenu = handleMenu;
          card.ontouchstart = (e) => {
            timer = setTimeout(() => handleMenu(e), 600);
          };
          card.ontouchend = () => clearTimeout(timer);
        });
      }

      document.getElementById("menu-delete").onclick = () => {
        if (confirm("Delete this entry?"))
          remove(ref(db, `feedings/${currentActiveLogId}`));
        menu.style.display = "none";
      };

      document.getElementById("menu-edit").onclick = () => {
        const newVol = prompt("Edit volume (ml):");
        if (newVol && !isNaN(newVol))
          update(ref(db, `feedings/${currentActiveLogId}`), {
            amount: parseFloat(newVol),
          });
        menu.style.display = "none";
      };

      window.addEventListener("click", () => {
        menu.style.display = "none";
      });
      window.addEventListener(
        "scroll",
        () => {
          menu.style.display = "none";
        },
        { passive: true },
      );
    </script>
  </body>
</html>
