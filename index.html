<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Baby Feed Tracker</title>
    <style>
      :root {
        --primary-blue: #1a73e8;
        --text-main: #1a1a1a;
        --text-secondary: #70757a;
        --border-color: #e8eaed;
      }
      body {
        font-family: -apple-system, sans-serif;
        background: #ffffff;
        padding: 20px;
        color: var(--text-main);
        max-width: 500px;
        margin: 0 auto;
        -webkit-tap-highlight-color: transparent;
      }
      h1 {
        font-size: 32px;
        font-weight: 800;
        margin: 20px 0 10px 0;
      }

      /* Last Fed Timer Style */
      .timer-banner {
        font-size: 16px;
        color: var(--text-secondary);
        margin-bottom: 25px;
        font-weight: 500;
      }
      .timer-bold {
        color: var(--primary-blue);
        font-weight: 700;
      }

      input {
        width: 100%;
        padding: 16px;
        border: 1px solid #ced4da;
        border-radius: 12px;
        font-size: 18px;
        box-sizing: border-box;
        margin-bottom: 10px;
      }
      .btn-submit {
        width: 100%;
        padding: 16px;
        background: var(--primary-blue);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 18px;
        font-weight: 700;
        cursor: pointer;
        margin-top: 5px;
      }

      .stats-bar {
        display: flex;
        justify-content: space-between;
        padding: 16px 0;
        border-bottom: 1px solid var(--border-color);
        font-weight: 500;
        margin-top: 10px;
      }
      .day-section {
        margin-top: 24px;
      }
      .day-title {
        color: var(--text-secondary);
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 12px;
      }

      .log-card {
        border: 1px solid var(--border-color);
        border-radius: 12px;
        margin-bottom: 8px;
        padding: 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: 600;
        cursor: pointer;
        user-select: none;
        -webkit-user-select: none;
        transition: background 0.1s;
      }
      .log-card:active {
        background: #f1f3f4;
      }
      .log-time-group {
        display: flex;
        flex-direction: column;
      }
      .log-note {
        font-size: 13px;
        color: var(--text-secondary);
        font-weight: 400;
        margin-top: 4px;
      }

      .day-summary {
        display: flex;
        justify-content: space-between;
        padding: 12px 4px;
        color: var(--text-secondary);
        font-size: 14px;
        border-bottom: 1px solid var(--border-color);
        margin-bottom: 10px;
      }

      /* Contextual Menu */
      #context-menu {
        position: fixed;
        display: none;
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        width: 150px;
        z-index: 1000;
        overflow: hidden;
      }
      .menu-item {
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 15px;
        cursor: pointer;
      }
      .menu-item:hover {
        background: #f8f9fa;
      }
      .menu-item.delete {
        color: #d93025;
        border-top: 1px solid #eee;
      }
    </style>
  </head>
  <body>
    <h1>Log feeding</h1>
    <div id="last-fed-display" class="timer-banner">
      Last fed: <span class="timer-bold">--</span> ago
    </div>

    <input
      type="number"
      id="volume"
      placeholder="How many ml"
      inputmode="decimal"
    />
    <input type="text" id="note" placeholder="Note (optional)" />
    <button class="btn-submit" id="logBtn">Submit</button>

    <div class="stats-bar">
      <span>Last 24h</span><span id="rolling-24h">0 ml</span>
    </div>

    <div id="history-container"></div>

    <div id="context-menu">
      <div class="menu-item" id="menu-edit">✏️ Edit</div>
      <div class="menu-item delete" id="menu-delete">🗑️ Delete</div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
      import {
        getDatabase,
        ref,
        push,
        onValue,
        remove,
        update,
      } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCecVwwq7pHQs0enaGUA6wUZG-Wz4KQ94c",
        authDomain: "feeder-99e8b.firebaseapp.com",
        projectId: "feeder-99e8b",
        storageBucket: "feeder-99e8b.firebasestorage.app",
        messagingSenderId: "662741977621",
        appId: "1:662741977621:web:e99e0beccb65b050c41c1c",
        measurementId: "G-F9Q342KXGC",
        databaseURL:
          "https://feeder-99e8b-default-rtdb.europe-west1.firebasedatabase.app/",
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
      const logsRef = ref(db, "feedings");

      let currentActiveLogId = null;
      let lastFeedingTimestamp = null;
      const menu = document.getElementById("context-menu");

      // TIMER LOGIC
      function updateTimer() {
        if (!lastFeedingTimestamp) return;
        const diff = Date.now() - lastFeedingTimestamp;
        const hours = Math.floor(diff / 3600000);
        const minutes = Math.floor((diff % 3600000) / 60000);
        document.querySelector(".timer-bold").innerText =
          `${hours}h ${minutes}m`;
      }
      setInterval(updateTimer, 30000); // Update every 30 seconds

      // SUBMIT
      document.getElementById("logBtn").onclick = () => {
        const vol = document.getElementById("volume").value;
        const note = document.getElementById("note").value;
        if (!vol) return;
        push(logsRef, {
          amount: parseFloat(vol),
          note: note,
          timestamp: Date.now(),
        });
        document.getElementById("volume").value = "";
        document.getElementById("note").value = "";
      };

      // SYNC & RENDER
      onValue(logsRef, (snapshot) => {
        const data = snapshot.val();
        const container = document.getElementById("history-container");
        const rollingDisplay = document.getElementById("rolling-24h");
        container.innerHTML = "";
        if (!data) {
          rollingDisplay.innerText = "0 ml";
          return;
        }

        const entries = Object.entries(data).sort(
          (a, b) => b[1].timestamp - a[1].timestamp,
        );
        lastFeedingTimestamp = entries[0][1].timestamp;
        updateTimer();

        // Stats
        const oneDayAgo = Date.now() - 86400000;
        const total24h = entries
          .filter((e) => e[1].timestamp > oneDayAgo)
          .reduce((s, e) => s + e[1].amount, 0);
        rollingDisplay.innerText = `${total24h} ml`;

        // Grouping
        const groups = entries.reduce((acc, [id, val]) => {
          const d = new Date(val.timestamp).toLocaleDateString("en-GB", {
            day: "2-digit",
            month: "short",
            year: "numeric",
          });
          if (!acc[d]) acc[d] = [];
          acc[d].push({ id, ...val });
          return acc;
        }, {});

        for (const [date, dayLogs] of Object.entries(groups)) {
          let dayTotal = 0;
          let dayHtml = `<div class="day-section"><div class="day-title">${date}</div>`;
          dayLogs.forEach((log) => {
            const time = new Date(log.timestamp).toLocaleTimeString([], {
              hour: "2-digit",
              minute: "2-digit",
              hour12: false,
            });
            dayTotal += log.amount;
            dayHtml += `
                        <div class="log-card" data-id="${log.id}">
                            <div class="log-time-group">
                                <span>${time}</span>
                                ${log.note ? `<span class="log-note">${log.note}</span>` : ""}
                            </div>
                            <span>${log.amount} ml</span>
                        </div>`;
          });
          dayHtml += `<div class="day-summary"><span>${dayLogs.length} times</span><span>${dayTotal} ml</span></div></div>`;
          container.innerHTML += dayHtml;
        }
        setupInteractions();
      });

      function setupInteractions() {
        document.querySelectorAll(".log-card").forEach((card) => {
          let timer;
          const id = card.getAttribute("data-id");
          const showMenu = (e) => {
            e.preventDefault();
            currentActiveLogId = id;
            menu.style.display = "block";
            menu.style.left = `${Math.min(e.pageX || e.touches[0].pageX, window.innerWidth - 160)}px`;
            menu.style.top = `${e.pageY || e.touches[0].pageY}px`;
          };
          card.oncontextmenu = showMenu;
          card.ontouchstart = (e) => {
            timer = setTimeout(() => showMenu(e), 600);
          };
          card.ontouchend = () => clearTimeout(timer);
        });
      }

      document.getElementById("menu-delete").onclick = () => {
        if (confirm("Delete?"))
          remove(ref(db, `feedings/${currentActiveLogId}`));
        menu.style.display = "none";
      };

      document.getElementById("menu-edit").onclick = () => {
        const newVol = prompt("New volume (ml):");
        if (newVol)
          update(ref(db, `feedings/${currentActiveLogId}`), {
            amount: parseFloat(newVol),
          });
        menu.style.display = "none";
      };

      window.onclick = () => (menu.style.display = "none");
    </script>
  </body>
</html>
